version: "2"
sql:
  - engine: "mysql"
    schema: "migrations"
    queries: "internal/storage/mysql/queries"
    gen:
      go:
        package: "gen"
        out: "internal/storage/mysql/gen"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
