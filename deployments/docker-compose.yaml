# Smart-Workflow 一键起五件套：mysql + redis + sidecar + server + worker
# （外加 migrate 一次性服务负责建表）。
#
#   docker compose -f deployments/docker-compose.yaml up -d --build
#
# 启动顺序（靠 depends_on + healthcheck 编排）：
#   mysql/redis healthy → migrate 建表跑完退出 → server/worker 启动（等 migrate 成功 + sidecar healthy）
#
# 关键设计（见 #35 pre-mortem）：
#   R1/R3 容器内地址：server/worker 连服务名+容器内端口（mysql:3306 / redis:6379 /
#     http://sidecar:8090），经 SWF_* 环境变量覆盖 config 默认值（默认值是给本地进程用的
#     127.0.0.1:3308/6381，两者不可混用）。宿主机仍可用映射端口 3308/6381 连基建调试。
#   R4 迁移：migrate 服务跑 goose up 后退出，server/worker 用
#     service_completed_successfully 等它，实现自动建表。
services:
  mysql:
    image: mysql:8.0
    container_name: swf-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: smart_workflow
      MYSQL_USER: swf
      MYSQL_PASSWORD: swfpass
    ports:
      - "3308:3306" # 宿主机调试用（容器间走 mysql:3306）
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - swf-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: swf-redis
    restart: unless-stopped
    ports:
      - "6381:6379" # 宿主机调试用（容器间走 redis:6379）
    volumes:
      - swf-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # 一次性建表：等 mysql healthy → goose up → 退出。幂等，重复启动安全。
  migrate:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.migrate
    image: swf-migrate:local
    container_name: swf-migrate
    environment:
      GOOSE_DRIVER: mysql
      # 容器内连 mysql:3306（非宿主机 3308）；goose mysql 驱动 DSN 格式同 go-sql-driver
      GOOSE_DBSTRING: "swf:swfpass@tcp(mysql:3306)/smart_workflow?parseTime=true"
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no" # 一次性任务，成功即止

  # Python 代码执行 sidecar。绑 0.0.0.0 供 server 跨容器访问。
  sidecar:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.sidecar
    image: swf-sidecar:local
    container_name: swf-sidecar
    restart: unless-stopped
    ports:
      - "8090:8090" # 宿主机调试用
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8090/healthz').status==200 else 1)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # gin API 网关。等 migrate 建表完成 + 基建/ sidecar healthy 再起。
  server:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.server
    image: swf-server:local
    container_name: swf-server
    restart: unless-stopped
    environment:
      SWF_ENV: prod
      SWF_SERVER_ADDR: ":8080"
      # R1：容器内地址，覆盖 config 默认的 127.0.0.1:3308/6381
      SWF_MYSQL_DSN: "swf:swfpass@tcp(mysql:3306)/smart_workflow?parseTime=true&charset=utf8mb4&loc=Local"
      SWF_REDIS_ADDR: "redis:6379"
      SWF_SIDECAR_BASEURL: "http://sidecar:8090"
      SWF_LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      sidecar:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # asynq 消费者。R3：必须与 server 指向同一个 redis，否则入队无人消费。
  worker:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
    image: swf-worker:local
    container_name: swf-worker
    restart: unless-stopped
    environment:
      SWF_ENV: prod
      SWF_MYSQL_DSN: "swf:swfpass@tcp(mysql:3306)/smart_workflow?parseTime=true&charset=utf8mb4&loc=Local"
      SWF_REDIS_ADDR: "redis:6379"
      SWF_SIDECAR_BASEURL: "http://sidecar:8090"
      SWF_LOG_LEVEL: info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      sidecar:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  swf-mysql-data:
  swf-redis-data:
